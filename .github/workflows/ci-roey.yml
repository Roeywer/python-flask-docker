name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build Docker image
        run: |
          docker build -t roeywer/images:python-flask-docker .
      - name: Run tests
        run: |
          docker run --name python-flask-docker -d -p 8080:8080 roeywer/images:python-flask-docker
          sleep 5
          curl -f http://localhost:8080/ || exit 1
      - name: Verify the running container
        run: |
          docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' roeywer/images:python-flask-docker
          docker inspect -f '{{ .Config.Hostname }}' roeywer/images:python-flask-docker
